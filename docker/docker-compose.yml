version: '3.9'
services:
  server:
    build:
      context: ./..
      dockerfile: apps/server/Dockerfile
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/reviewsense
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongo
      - redis
  client:
    build:
      context: ./..
      dockerfile: apps/client/Dockerfile
    ports:
      - '5173:5173'
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api/v1
  mongo:
    image: mongo:6.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
volumes:
  mongo-data:
